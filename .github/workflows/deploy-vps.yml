name: Deploy Backend a VPS Hetzner

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    steps:
      - name: Conectar al VPS y actualizar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash /opt/copiamelafinal/scripts/vps/actualizar-deploy.sh

      - name: Verificar que el servidor responde
        run: |
          sleep 5
          curl -f http://${{ secrets.VPS_IP }}/api/healthz || exit 1
          echo Servidor OK
