<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Super TV - Modo Ligero</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090E17;color:#fff;font-family:Arial,sans-serif;min-height:100vh}
header{background:#0d1420;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:2px solid #e50914}
header img{width:40px;border-radius:8px}
header h1{color:#e50914;font-size:1.5rem}
header span{color:#aaa;font-size:0.85rem;margin-left:auto}
#logout-btn{background:transparent;border:1px solid #4b5563;color:#9ca3af;font-size:0.8rem;padding:0.3rem 0.75rem;border-radius:4px;cursor:pointer;margin-left:0.75rem;display:none}
#logout-btn:hover{border-color:#e50914;color:#fff}
nav{background:#111827;display:flex;overflow-x:auto;padding:0 1rem;border-bottom:1px solid #1f2937;-webkit-overflow-scrolling:touch}
nav a{display:inline-block;padding:0.85rem 1.25rem;color:#9ca3af;text-decoration:none;white-space:nowrap;font-size:0.95rem;border-bottom:3px solid transparent;-webkit-transition:color 0.2s;transition:color 0.2s}
nav a.active,nav a:hover{color:#fff;border-bottom-color:#e50914}
#status{padding:0.75rem 1.5rem;background:#1f2937;color:#9ca3af;font-size:0.85rem;text-align:center}
#grid{padding:1rem 1.5rem;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:0.75rem}
.card{background:#1a2235;border-radius:8px;overflow:hidden;width:calc(25% - 0.75rem);min-width:140px;cursor:pointer;border:2px solid transparent;-webkit-transition:border-color 0.15s;transition:border-color 0.15s}
.card:hover,.card:focus{border-color:#e50914;outline:none}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#111;display:block}
.card-info{padding:0.4rem 0.5rem}
.card-title{font-size:0.75rem;color:#d1d5db;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-badge{display:inline-block;background:#e50914;color:#fff;font-size:0.6rem;padding:1px 5px;border-radius:3px;margin-bottom:2px;text-transform:uppercase}
.empty{text-align:center;padding:3rem;color:#6b7280;width:100%}
.loading-bar{height:3px;background:#e50914;width:0;-webkit-transition:width 0.3s;transition:width 0.3s;position:fixed;top:0;left:0;z-index:999}
@media(max-width:600px){.card{width:calc(50% - 0.75rem)}}

/* Login overlay */
#login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#090E17;z-index:9999;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center}
#login-box{background:#0d1420;border:1px solid #1f2937;border-radius:12px;padding:2rem 2.5rem;width:100%;max-width:360px;text-align:center}
#login-box img{width:60px;border-radius:12px;margin-bottom:1rem}
#login-box h2{color:#e50914;font-size:1.4rem;margin-bottom:0.4rem}
#login-box p{color:#6b7280;font-size:0.85rem;margin-bottom:1.5rem}
#code-input{width:100%;background:#111827;border:1px solid #374151;color:#fff;font-size:1rem;padding:0.75rem 1rem;border-radius:8px;outline:none;text-align:center;letter-spacing:0.05em;-webkit-appearance:none}
#code-input:focus{border-color:#e50914}
#login-btn{width:100%;margin-top:0.75rem;background:#e50914;border:none;color:#fff;font-size:1rem;font-weight:bold;padding:0.75rem;border-radius:8px;cursor:pointer;-webkit-transition:background 0.2s;transition:background 0.2s}
#login-btn:hover{background:#c0060f}
#login-btn:disabled{background:#4b0a0a;cursor:default;opacity:0.7}
#login-error{margin-top:0.75rem;color:#f87171;font-size:0.85rem;min-height:1.2em}
</style>
</head>
<body>
<div class="loading-bar" id="bar"></div>

<!-- Login Overlay -->
<div id="login-overlay">
  <div id="login-box">
    <img src="/icon-192.png" alt="Super TV">
    <h2>Super TV</h2>
    <p>Ingresa tu código de acceso para continuar</p>
    <input type="text" id="code-input" placeholder="Código de acceso" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="login-btn">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- App -->
<header>
  <img src="/icon-192.png" alt="Super TV">
  <h1>Super TV</h1>
  <span id="hdr-info">Modo Ligero</span>
  <button id="logout-btn">Salir</button>
</header>
<nav id="tabs">
  <a href="#" class="active" data-tab="channels">En Vivo</a>
  <a href="#" data-tab="movies">Películas</a>
  <a href="#" data-tab="series">Series</a>
</nav>
<div id="status">Cargando...</div>
<div id="grid"></div>

<script>
var API = '/api';
var currentTab = 'channels';
var allData = {channels: null, movies: null, series: null};
var authToken = null;

/* ---- Storage helpers ---- */
function getDeviceId() {
  var id = null;
  try { id = localStorage.getItem('lite_device_id'); } catch(e){}
  if (!id) {
    id = 'lite_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    try { localStorage.setItem('lite_device_id', id); } catch(e){}
  }
  return id;
}
function saveToken(t) {
  authToken = t;
  try { localStorage.setItem('lite_token', t); } catch(e){}
}
function loadToken() {
  try { return localStorage.getItem('lite_token'); } catch(e){ return null; }
}
function clearToken() {
  authToken = null;
  try { localStorage.removeItem('lite_token'); } catch(e){}
}

/* ---- XHR helper (with optional auth) ---- */
function xhr(url, cb, options) {
  var r = new XMLHttpRequest();
  var method = (options && options.method) || 'GET';
  r.open(method, url);
  if (authToken) r.setRequestHeader('Authorization', 'Bearer ' + authToken);
  if (options && options.json) r.setRequestHeader('Content-Type', 'application/json');
  r.onreadystatechange = function() {
    if (r.readyState === 4) {
      if (r.status >= 200 && r.status < 300) {
        try { cb(null, JSON.parse(r.responseText)); } catch(e) { cb(e); }
      } else {
        var errMsg = 'HTTP ' + r.status;
        try {
          var body = JSON.parse(r.responseText);
          if (body && body.error) errMsg = body.error;
        } catch(e){}
        cb(new Error(errMsg), null, r.status);
      }
    }
  };
  r.send(options && options.body ? JSON.stringify(options.body) : null);
}

/* ---- Login / Logout ---- */
function showLogin(errMsg) {
  allData = {channels: null, movies: null, series: null};
  document.getElementById('grid').innerHTML = '';
  document.getElementById('login-error').textContent = errMsg || '';
  document.getElementById('login-overlay').style.display = '-webkit-flex';
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('code-input').value = '';
  document.getElementById('code-input').focus();
}

function hideLogin(displayName) {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'inline-block';
  if (displayName) {
    document.getElementById('hdr-info').textContent = displayName + ' · Modo Ligero';
  }
}

function doLogin(code) {
  var btn = document.getElementById('login-btn');
  var errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Verificando...';
  errEl.textContent = '';
  xhr(API + '/auth/login', function(err, data, status) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    if (err) {
      var msg = err.message || 'Error al iniciar sesión';
      if (msg === 'El código no existe' || msg === 'NOT_FOUND') msg = 'Código incorrecto. Inténtalo de nuevo.';
      if (msg === 'El código está inactivo' || msg === 'INACTIVE') msg = 'Este código está desactivado.';
      if (msg === 'El código ha expirado' || msg === 'EXPIRED') msg = 'Este código ha expirado.';
      errEl.textContent = msg;
      return;
    }
    if (data && data.token) {
      saveToken(data.token);
      var name = (data.code && (data.code.name || data.code.displayName)) || '';
      hideLogin(name);
      loadTab('channels');
    } else {
      errEl.textContent = 'Respuesta inesperada del servidor.';
    }
  }, { method: 'POST', json: true, body: { code: code, deviceId: getDeviceId() } });
}

function doLogout() {
  xhr(API + '/auth/logout', function() {}, { method: 'POST', json: true, body: {} });
  clearToken();
  showLogin();
}

/* ---- Verify existing session ---- */
function checkSession(token, onOk, onFail) {
  authToken = token;
  xhr(API + '/auth/me', function(err, data) {
    if (err || !data) { authToken = null; onFail(); return; }
    onOk(data);
  });
}

/* ---- UI helpers ---- */
function setBar(pct) {
  var bar = document.getElementById('bar');
  if (bar) bar.style.width = pct + '%';
}
function setStatus(msg) {
  var s = document.getElementById('status');
  if (s) s.textContent = msg;
}

function playStream(url, title) {
  if (!url) return;
  var ok = false;
  if (window.MediaSource || url.indexOf('.m3u8') === -1) {
    var win = window.open('', '_blank');
    if (win) {
      win.document.write('<html><head><title>' + title + '</title><style>*{margin:0;padding:0;background:#000}video{width:100vw;height:100vh}</style></head><body><video src="' + url + '" autoplay controls></video></body></html>');
      win.document.close();
      ok = true;
    }
  }
  if (!ok) window.location.href = url;
}

function renderChannels(items) {
  var grid = document.getElementById('grid');
  if (!items || !items.length) { grid.innerHTML = '<div class="empty">Sin canales disponibles</div>'; return; }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var ch = items[i];
    var name = ch.name || ch.title || 'Canal';
    var logo = ch.logo || ch.thumbnail || '/channel-default.png';
    var streamUrl = ch.stream_url || ch.url || ch.hls_url || '';
    var cat = ch.category || '';
    html += '<div class="card" tabindex="0" data-url="' + encodeURIComponent(streamUrl) + '" data-title="' + name.replace(/"/g,'') + '">';
    html += '<img src="' + logo + '" onerror="this.src=\'/channel-default.png\'" loading="lazy" alt="' + name + '">';
    html += '<div class="card-info">';
    if (cat) html += '<span class="card-badge">' + cat + '</span><br>';
    html += '<span class="card-title">' + name + '</span></div></div>';
  }
  grid.innerHTML = html;
  grid.onclick = function(e) {
    var card = e.target;
    while (card && card !== grid) {
      if (card.classList.contains('card')) break;
      card = card.parentNode;
    }
    if (card && card.dataset.url) playStream(decodeURIComponent(card.dataset.url), card.dataset.title || '');
  };
}

function renderMovies(items) {
  var grid = document.getElementById('grid');
  if (!items || !items.length) { grid.innerHTML = '<div class="empty">Sin películas disponibles</div>'; return; }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var m = items[i];
    var title = m.title || m.name || 'Película';
    var thumb = m.thumbnail || m.poster || m.backdrop_path || '/channel-default.png';
    var streamUrl = m.stream_url || m.url || m.hls_url || '';
    var cat = m.category || m.genre || '';
    html += '<div class="card" tabindex="0" data-url="' + encodeURIComponent(streamUrl) + '" data-title="' + title.replace(/"/g,'') + '">';
    html += '<img src="' + thumb + '" onerror="this.src=\'/channel-default.png\'" loading="lazy" alt="' + title + '">';
    html += '<div class="card-info">';
    if (cat) html += '<span class="card-badge">' + cat + '</span><br>';
    html += '<span class="card-title">' + title + '</span></div></div>';
  }
  grid.innerHTML = html;
  grid.onclick = function(e) {
    var card = e.target;
    while (card && card !== grid) {
      if (card.classList.contains('card')) break;
      card = card.parentNode;
    }
    if (card && card.dataset.url) playStream(decodeURIComponent(card.dataset.url), card.dataset.title || '');
  };
}

function loadTab(tab) {
  currentTab = tab;
  var tabs = document.querySelectorAll('nav a');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].className = tabs[i].dataset.tab === tab ? 'active' : '';
  }
  document.getElementById('grid').innerHTML = '';
  setBar(10);

  if (tab === 'channels') {
    if (allData.channels) { setBar(100); setStatus(allData.channels.length + ' canales'); renderChannels(allData.channels); return; }
    setStatus('Cargando canales...');
    xhr(API + '/channels', function(err, data, status) {
      setBar(100);
      if (err) {
        if (status === 401) { clearToken(); showLogin('Tu sesión expiró. Vuelve a iniciar sesión.'); return; }
        setStatus('Error cargando canales'); return;
      }
      var items = Array.isArray(data) ? data : (data.channels || data.data || []);
      allData.channels = items;
      setStatus(items.length + ' canales en vivo');
      renderChannels(items);
    });
  } else if (tab === 'movies') {
    if (allData.movies) { setBar(100); setStatus(allData.movies.length + ' películas'); renderMovies(allData.movies); return; }
    setStatus('Cargando películas...');
    xhr(API + '/movies?limit=200', function(err, data, status) {
      setBar(100);
      if (err) {
        if (status === 401) { clearToken(); showLogin('Tu sesión expiró. Vuelve a iniciar sesión.'); return; }
        setStatus('Error cargando películas'); return;
      }
      var items = Array.isArray(data) ? data : (data.movies || data.data || []);
      allData.movies = items;
      setStatus(items.length + ' películas');
      renderMovies(items);
    });
  } else if (tab === 'series') {
    if (allData.series) { setBar(100); setStatus(allData.series.length + ' series'); renderMovies(allData.series); return; }
    setStatus('Cargando series...');
    xhr(API + '/series?limit=200', function(err, data, status) {
      setBar(100);
      if (err) {
        if (status === 401) { clearToken(); showLogin('Tu sesión expiró. Vuelve a iniciar sesión.'); return; }
        setStatus('Error cargando series'); return;
      }
      var items = Array.isArray(data) ? data : (data.series || data.data || []);
      allData.series = items;
      setStatus(items.length + ' series');
      renderMovies(items);
    });
  }
}

/* ---- Event listeners ---- */
document.getElementById('tabs').onclick = function(e) {
  if (e.target && e.target.dataset.tab) {
    e.preventDefault();
    loadTab(e.target.dataset.tab);
  }
};

document.getElementById('logout-btn').onclick = doLogout;

document.getElementById('login-btn').onclick = function() {
  var code = document.getElementById('code-input').value.trim();
  if (!code) { document.getElementById('login-error').textContent = 'Ingresa tu código de acceso.'; return; }
  doLogin(code);
};

document.getElementById('code-input').onkeydown = function(e) {
  if (e.keyCode === 13) {
    var code = this.value.trim();
    if (!code) { document.getElementById('login-error').textContent = 'Ingresa tu código de acceso.'; return; }
    doLogin(code);
  }
};

/* ---- Boot ---- */
var savedToken = loadToken();
if (savedToken) {
  checkSession(savedToken, function(data) {
    var name = data.displayName || data.codeName || '';
    hideLogin(name);
    loadTab('channels');
  }, function() {
    clearToken();
    showLogin();
  });
} else {
  showLogin();
}
</script>
</body>
</html>
