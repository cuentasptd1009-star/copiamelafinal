        if (!Math.sign)  Math.sign  = function(x) { return x > 0 ? 1 : x < 0 ? -1 : 0; };

        if (!Math.imul)   Math.imul = function(a,b) { var ah=(a>>>16)&0xffff,al=a&0xffff,bh=(b>>>16)&0xffff,bl=b&0xffff; return (al*bl)+((((ah*bl)+(al*bh))<<16)>>>0)|0; };

          P.reject=function(v){return new P(function(_,r){r(v);});};

          P.race=function(ps){return new P(function(res,rej){ps.forEach(function(p){P.resolve(p).then(res,rej);});});};

        } else if (!Promise.allSettled) {

            }));
          };
        }

        if (!window.crypto) window.crypto = {};
        if (!window.crypto.getRandomValues) {
          window.crypto.getRandomValues = function(arr) {
            for (var i = 0; i < arr.length; i++) arr[i] = Math.floor(Math.random() * 256);
            return arr;
          };
        }
        if (!window.crypto.randomUUID) {
          window.crypto.randomUUID = function() {
            var b = new Uint8Array(16);
            window.crypto.getRandomValues(b);
            b[6] = (b[6] & 0x0f) | 0x40;
            b[8] = (b[8] & 0x3f) | 0x80;
            function h(n) { return ('00'+n.toString(16)).slice(-2); }
            return h(b[0])+h(b[1])+h(b[2])+h(b[3])+'-'+h(b[4])+h(b[5])+'-'+h(b[6])+h(b[7])+'-'+h(b[8])+h(b[9])+'-'+h(b[10])+h(b[11])+h(b[12])+h(b[13])+h(b[14])+h(b[15]);

        var lastTime = 0;
        if (!window.requestAnimationFrame) {
          window.requestAnimationFrame = function(cb) {

        }

        if (!window.queueMicrotask) {
          window.queueMicrotask = function(fn) {
            Promise.resolve().then(fn).catch(function(e) { setTimeout(function() { throw e; }); });
          };
        }

        if (!window.structuredClone) {
          window.structuredClone = function(obj) {
            try { return JSON.parse(JSON.stringify(obj)); } catch(e) { return obj; }
          };
        }

        if (typeof globalThis === 'undefined') {
          (function() {
            Object.defineProperty(Object.prototype, '__magic__', {
              get: function() { return this; },
              configurable: true

            delete Object.prototype.__magic__;
            if (typeof g === 'undefined') { g = window; }

          }());

        if (typeof window.CustomEvent !== 'function') {
          function CustomEvent(event, params) {
            params = params || { bubbles: false, cancelable: false, detail: null };
            var evt = document.createEvent('CustomEvent');
            evt.initCustomEvent(event, params.bubbles, params.cancelable, params.detail);
            return evt;
          }
          CustomEvent.prototype = window.Event.prototype;
          window.CustomEvent = CustomEvent;
        }

        if (typeof ResizeObserver === 'undefined') {
          window.ResizeObserver = function(cb) {
            var self = this;
            self._cb = cb; self._els = [];
            self.observe = function(el) {
              self._els.push(el);
              var last = { w: el.offsetWidth, h: el.offsetHeight };
              (function poll() {
                if (self._els.indexOf(el) === -1) return;
                var cur = { w: el.offsetWidth, h: el.offsetHeight };

                  try { self._cb([{ contentRect: cur, target: el }], self); } catch(e) {}
                }
                setTimeout(poll, 500);
              })();
            };
            self.unobserve = function(el) { self._els = self._els.filter(function(e){return e!==el;}); };
            self.disconnect = function() { self._els = []; };
          };
        }

        if (typeof IntersectionObserver === 'undefined') {
          window.IntersectionObserver = function() {
            this.observe = function() {};
            this.unobserve = function() {};
            this.disconnect = function() {};
          };
          window.IntersectionObserverEntry = function() {};
        }

        if (!Object.fromEntries) {
          Object.fromEntries = function(entries) {
            var obj = {};
            for (var i = 0; i < entries.length; i++) obj[entries[i][0]] = entries[i][1];
            return obj;
          };
        }

        if (!Array.prototype.flat) {
          Array.prototype.flat = function(depth) {
            depth = depth === undefined ? 1 : Math.floor(depth);

        }
        if (!Array.prototype.flatMap) {
          Array.prototype.flatMap = function(fn, ctx) {
            return Array.prototype.map.call(this, fn, ctx).flat(1);

        if (!Element.prototype.matches) {
          Element.prototype.matches = Element.prototype.msMatchesSelector ||
            Element.prototype.webkitMatchesSelector || function(s) {

        }
        if (!Element.prototype.closest) {
          Element.prototype.closest = function(sel) {
            var el = this;
            while (el && el.nodeType === 1) {

        if (!Element.prototype.remove) {
          Element.prototype.remove = function() { if (this.parentNode) this.parentNode.removeChild(this); };
        }

        if (!window.fetch) {
          window.fetch = function(url, options) {
            return new Promise(function(resolve, reject) {

        if (!window.URLSearchParams) {
          window.URLSearchParams = function(init) {
            this._p = {};

        if (!window.AbortController) {
          window.AbortController = function() {
            var listeners = [];

              aborted: false,
              addEventListener: function(_, fn) { listeners.push(fn); },

        /* Smart TV detection — only disables heavy animations, never blocks loading */
        var __isModernTv = (function() {
          var ua = navigator.userAgent;
          return /Tizen|Web0S|webOS|SMART-TV|SmartTV|HbbTV|BRAVIA|Viera|PhilipsTV|AFT[A-Z]|CrKey|WebAppManager|NetCast|NETTV|Maple/i.test(ua);
        })();

          try { return window.CSS && window.CSS.supports && window.CSS.supports('color', 'var(--x)'); } catch(e) { return false; }
        })();
        if (!cssVarsOk) {
          var s = document.createElement('style');
          s.textContent = 'body,html{background:#090E17;color:#fff;font-family:Inter,sans-serif}#app-loading{background:#090E17}';
          document.head.appendChild(s);
        }

        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('keydown', function(e) {
          if (e.key === 'F12') { e.preventDefault(); return false; }
          if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) { e.preventDefault(); return false; }

    </script>
    <style>
    *{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
    #app-loading{
      display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;
      -webkit-box-orient:vertical;-webkit-box-direction:normal;
      -webkit-flex-direction:column;-ms-flex-direction:column;flex-direction:column;
      -webkit-box-align:center;-webkit-align-items:center;-ms-flex-align:center;align-items:center;
      -webkit-box-pack:center;-webkit-justify-content:center;-ms-flex-pack:center;justify-content:center;
      min-height:100vh;background:#090E17;color:#fff;font-family:Inter,sans-serif;
    }
    #app-loading .spinner{
      width:48px;height:48px;
      border:4px solid rgba(255,255,255,0.15);
      border-top-color:#e11d48;
      border-radius:50%;
      margin-bottom:24px;
      will-change:transform;
      -webkit-animation:spin 0.9s linear infinite;
      animation:spin 0.9s linear infinite;
    }
    @-webkit-keyframes spin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
    @keyframes spin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
    #app-loading p{color:rgba(255,255,255,0.5);font-size:14px;margin:0}

    <div id="app-loading">

    </div>

    </script>
